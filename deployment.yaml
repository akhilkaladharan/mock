apiVersion: apps/v1
kind: Deployment

metadata:
  name: novavi-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: novavi

  template:
    metadata:
      labels:
        app: novavi

    spec:
      containers:
      - name: novavi

        image: akhiakhi1/novavi-app:latest

        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service

metadata:
  name: novavi-service

spec:
  type: NodePort

  selector:
    app: novavi

  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 30080
