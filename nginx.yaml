- name: Configure Web Servers
  hosts: webservers
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install Nginx
      package:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy custom index page
      template:
        src: index.html
        dest: /var/www/html/index.html
